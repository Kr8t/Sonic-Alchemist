
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONIC ALCHEMIST | TE-CORE ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --te-bg: #ececec;
            --te-dark: #1a1a1a;
            --te-orange: #ff5f00;
            --te-yellow: #faff00;
            --te-border: #d1d1d1;
            --te-panel: #f5f5f5;
            
            /* Theme Variables - Default to TE-Core */
            --bg: var(--te-bg);
            --dark: var(--te-dark);
            --accent: var(--te-orange);
            --accent-rgb: 255, 95, 0;
            --secondary: var(--te-yellow);
            --border: var(--te-border);
            --panel: var(--te-panel);
            --screen-bg: #000;
            --screen-text: var(--te-orange);
            --grid-color: var(--te-border);
        }

        [data-theme='cyberpunk'] {
            --bg: #050505;
            --dark: #ffffff;
            --accent: #00f3ff;
            --accent-rgb: 0, 243, 255;
            --secondary: #ff00ff;
            --border: #333333;
            --panel: #121212;
            --screen-bg: #000;
            --screen-text: #00f3ff;
            --grid-color: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(var(--grid-color) 1px, transparent 1px);
            background-size: 32px 32px;
            transition: background-color 0.3s, color 0.3s;
        }
        .mono-font {
            font-family: 'JetBrains Mono', monospace;
        }
        .hardware-panel {
            background: var(--panel);
            border: 2px solid var(--dark);
            box-shadow: 4px 4px 0px var(--dark);
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        .display-screen {
            background: var(--screen-bg);
            color: var(--screen-text);
            font-family: 'JetBrains Mono', monospace;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(var(--screen-text-rgb), 0.2);
        }
        .te-button {
            background: var(--panel);
            border: 2px solid var(--dark);
            box-shadow: 0 4px 0 var(--dark);
            transition: all 0.1s;
        }
        .te-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--dark);
        }
        .te-button-orange {
            background: var(--accent);
            color: var(--bg);
        }
        .segmented-display {
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.05em;
        }
        .knob-base {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--dark);
            border: 4px solid var(--border);
            position: relative;
        }
        .knob-indicator {
            position: absolute;
            top: 4px;
            left: 50%;
            width: 4px;
            height: 12px;
            background: var(--accent);
            transform: translateX(-50%);
        }
    </style>
